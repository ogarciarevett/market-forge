description = "One-time project setup — interview for stack/requirements, fill .ai/context.md, and regenerate every tool's config"
prompt = """
Invoke the agent-skills:project-bootstrap skill.

Use this once, right after starting from the cross-ai-template, while `.ai/context.md` still
has `<!-- FILL: … -->` placeholders. (Don't confuse it with the built-in `/init`.)

Interview the user one question at a time, with your best guess attached, to gather:
1. **Project** — what it does, who uses it, and the dominant correctness/quality constraint.
2. **Stack (locked)** — runtime/language, framework, validation, datastore + ORM, queue/cache,
   logger, test runner, linter/formatter, and explicit NOs. Infer from the repo, then confirm.
3. **Definition of Done** — test command + coverage threshold, typecheck command, lint command,
   and any project-specific gates.
4. **Hard rules** — project-specific additions to the always/never list.

Then:
- Replace the `<!-- FILL -->` markers in `.ai/context.md` with the answers; leave the
  Source-of-truth and Memory-protocol sections untouched. Set the title to the project name.
- Optionally seed `.ai/specs/00-requirements.md`, or hand off to `/spec` for the full spec.
- Run `cargo xtask sync-ai` to regenerate AGENTS.md, CLAUDE.md, GEMINI.md, and every tool mirror.
- Show the diff, remind the human to commit, and point them to `/spec → /plan → /build`.

Do NOT overwrite an already-filled `.ai/context.md` without confirming. Never invent stack
choices — infer and confirm, or ask. Never write secrets.
"""
