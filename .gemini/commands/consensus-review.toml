description = "Parallel 2-of-3 reviewer fan-out (code-reviewer + security-auditor + performance-reviewer); writes .ai/specs/03-review.md"
prompt = """
# /consensus-review — project-level finish gate

Run the parallel fan-out review panel over the completed feature (pipeline step 6). This is
the "parallel fan-out" stage — it lives here, not in `/ship`.

## Steps
1. Gather ground truth: the diff/branch under review, the relevant `.ai/specs/` sections, and
   the actual source files. Brief each reviewer with verified context — never guesses.
2. Launch three reviewers **concurrently** (an Agent Team in Claude Code, or sub-agents in
   other tools), each in its own context:
   - `code-reviewer` — five-axis: correctness, readability, architecture, security, performance
   - `security-auditor` — vulnerability / OWASP-style audit
   - `performance-reviewer` — hot paths, allocations, I/O & query cost, throughput
   Reviewers do not call each other; each returns a verdict + findings.
3. **Gate: require ≥ 2-of-3 APPROVE** to pass. Any Critical finding blocks regardless of count.
4. Consolidate into `.ai/specs/03-review.md`: the verdict table, per-finding disposition
   (`✅ FIXED` now vs `📋 DEFERRED` to `98-nice-to-haves.md` with rationale), and evidence
   (gate-command output). If the gate fails, remediate (often via `/code-simplify`) and re-run.

## Notes
- Use a team / sub-agents only here and for genuinely independent work — not for trivial diffs.
- Each reviewer is read-only; the lead applies fixes and re-runs the integrated checks.
"""
